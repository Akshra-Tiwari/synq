services:
  - type: web
    name: devconnect-api
    env: node
    region: oregon
    plan: starter
    rootDir: apps/server
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    autoDeploy: false   # Controlled by GitHub Actions deploy workflow

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000         # Render default port
      - key: FRONTEND_URL
        fromGroup: devconnect-secrets
      - key: MONGODB_URI
        fromGroup: devconnect-secrets
      - key: REDIS_URL
        fromGroup: devconnect-secrets
      - key: JWT_ACCESS_SECRET
        fromGroup: devconnect-secrets
      - key: JWT_REFRESH_SECRET
        fromGroup: devconnect-secrets
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        fromGroup: devconnect-secrets
      - key: CLOUDINARY_API_KEY
        fromGroup: devconnect-secrets
      - key: CLOUDINARY_API_SECRET
        fromGroup: devconnect-secrets
      - key: SMTP_HOST
        fromGroup: devconnect-secrets
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        fromGroup: devconnect-secrets
      - key: SMTP_PASS
        fromGroup: devconnect-secrets
      - key: EMAIL_FROM
        value: noreply@devconnect.app

    # Scale: 1 instance on starter (upgrade to scale horizontally)
    scaling:
      minInstances: 1
      maxInstances: 1
